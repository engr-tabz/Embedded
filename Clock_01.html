<div id="clock" style="font-size:13px; text-align: right;"></div>

<script>
function updateClock() {
  const now = new Date();

  const options = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit',
    hour12: true
  };

  document.getElementById("clock").innerHTML =
    now.toLocaleString('en-US', options);
}

setInterval(updateClock, 1000);
updateClock();
</script>
